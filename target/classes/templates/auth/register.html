<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CoinWise</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background-color: var(--background); 
        }
        .auth-card { 
            background: var(--surface); 
            padding: 48px; 
            border-radius: var(--radius-lg); 
            box-shadow: var(--shadow-md); 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid rgba(0,0,0,0.05);
            box-sizing: border-box;
        }
        .auth-card h2 { color: var(--primary); margin-bottom: 8px; font-size: 28px; }
        .auth-card p.subtitle { color: var(--text-muted); margin-bottom: 32px; font-size: 15px; }
        .form-group { text-align: left; margin-bottom: 24px; }
        .form-group label { font-size: 14px; font-weight: 500; color: var(--text-main); margin-bottom: 8px; display: block; }
        .form-group input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 15px; box-sizing: border-box; outline: none; transition: all 0.2s; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .btn-primary { width: 100%; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: var(--radius-md); background-color: var(--primary); color: white; transition: background-color 0.2s; margin-top: 8px; }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .alert { padding: 12px; border-radius: var(--radius-md); margin-bottom: 24px; font-size: 14px; text-align: left; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>🌍 CoinWise</h2>
        <p class="subtitle">Create a new account</p>

        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/auth/register}" th:object="${user}" method="post">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" th:field="*{name}" placeholder="Jane Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" placeholder="jane@example.com" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" th:field="*{username}" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Create a password" required>
            </div>
            <button type="submit" class="btn-primary">Register</button>
        </form>
        
        <p style="margin-top: 32px; margin-bottom:0; font-size: 14px; color: var(--text-muted);">
            Already have an account? <a th:href="@{/auth/login}" style="color: var(--primary); font-weight: 600; text-decoration: none;">Login here</a>
        </p>
    </div>
</body>
</html>
