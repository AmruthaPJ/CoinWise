<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Settings</title>
</head>
<body>
<div layout:fragment="content">
    <h2>App Settings</h2>
    <p style="color:var(--text-muted); margin-bottom:24px;">Configure your profile and budget limits.</p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="dash-row">
        <div class="card">
            <h3>Profile & Budget Configuration</h3>
            <form th:action="@{/settings/update}" method="post" style="margin-top: 16px;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" th:value="${user.name}" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" th:value="${user.email}" required>
                </div>
                <div class="form-group">
                    <label>Monthly Budget Limit (₹)</label>
                    <input type="number" step="0.01" name="budgetLimit" th:value="${budget}" required>
                </div>
                <button type="submit" class="btn-primary">Save Changes</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
