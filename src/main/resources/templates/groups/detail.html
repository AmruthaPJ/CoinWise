<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Group Details</title>
</head>
<body>
<div layout:fragment="content">
    <h2><span th:text="${group.name}">Group Name</span> Dashboard</h2>
    <p style="color:var(--text-muted); margin-bottom:24px;">
        Created by <span th:text="${group.createdBy.name}">Creator</span> on 
        <span th:text="${#temporals.format(group.createdAt, 'dd MMM yyyy')}">Date</span>
    </p>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="dash-row">
        <!-- Members info -->
        <div class="card">
            <h3>Members (<span th:text="${group.members.size()}"></span>)</h3>
            <div style="margin-top: 16px; display:flex; gap:10px; flex-wrap:wrap;">
                <div th:each="member : ${group.members}" 
                     class="avatar" 
                     th:title="${member.name}" 
                     th:text="${#strings.substring(member.name,0,1).toUpperCase()}">U</div>
            </div>
        </div>
        
        <!-- Group Ledger -->
        <div class="card" style="flex: 2;">
            <h3>Group Ledger</h3>
            <ul class="list-group" style="margin-top: 16px;">
                <li class="list-item" th:if="${expenses == null || expenses.size() == 0}">
                    No expenses logged in this group yet.
                </li>
                <li class="list-item" th:each="expense : ${expenses}" style="align-items: center; justify-content: space-between; gap: 10px;">
                    <div class="item-left">
                        <strong th:text="${expense.description}">Description</strong>
                        <span th:text="'Paid by ' + ${expense.paidBy.name}">Paid by Info</span>
                        
                        <div th:each="split : ${expense.splits}" th:if="${split.user.id == currentUser.id && split.isPaid == false}" style="margin-top: 8px;">
                            <form th:action="@{/settlements/pay}" method="post" style="display:inline;">
                                <input type="hidden" name="expenseId" th:value="${expense.id}" />
                                <input type="hidden" name="payeeId" th:value="${expense.paidBy.id}" />
                                <input type="hidden" name="amount" th:value="${split.amountOwed}" />
                                <input type="hidden" name="groupId" th:value="${group.id}" />
                                <button type="submit" class="badge badge-danger" style="border:none; cursor:pointer;" title="Click to pay your share">
                                    Settle ₹<span th:text="${split.amountOwed}"></span>
                                </button>
                            </form>
                        </div>
                        <div th:each="split : ${expense.splits}" th:if="${split.user.id == currentUser.id && split.isPaid == true && expense.paidBy.id != currentUser.id}" style="margin-top: 8px;">
                            <span class="badge badge-success">Settled ₹<span th:text="${split.amountOwed}"></span></span>
                        </div>
                    </div>
                    <div class="item-right" style="text-align: right;">
                        <strong style="color: var(--danger);" th:text="'Total: ₹' + ${#numbers.formatDecimal(expense.totalAmount, 1, 'COMMA', 2, 'POINT')}">Amount</strong>
                        <span th:text="${#temporals.format(expense.createdAt, 'dd MMM yyyy')}">Date</span>
                        <div style="display:flex; flex-direction:column; gap:4px; margin-top:5px; align-items:flex-end;">
                            <span th:if="${expense.status.name() == 'UNPAID'}" class="badge badge-danger">Unpaid</span>
                            <span th:if="${expense.status.name() == 'PARTIALLY_PAID'}" class="badge" style="background:var(--warning); color:#333;">Partial</span>
                            <span th:if="${expense.status.name() == 'SETTLED'}" class="badge badge-success">Settled</span>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
